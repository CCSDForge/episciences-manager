name: Generate Changelog
on:
  push:
    branches: [develop, preprod, main]
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    # avoid infinite loops if the last commit was made by the bot
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Find previous tag if any
      - name: Get previous tag (if any)
        id: prev_tag
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      # Decide fromRef (last tag or first commit)
      - name: Compute fromRef
        id: fromref
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            echo "ref=${{ steps.prev_tag.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            echo "ref=$FIRST_COMMIT" >> $GITHUB_OUTPUT
          fi

      # Build changelog from conventional commits
      - name: Generate changelog from commits
        id: changelog
        env:
          FROM_REF: ${{ steps.fromref.outputs.ref }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          DATE_UTC=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Get commits since last tag/ref
          COMMITS=$(git log ${FROM_REF}..HEAD --pretty=format:"%h|%s|%an" --no-merges | grep -v "chore(changelog)")

          if [ -z "$COMMITS" ]; then
            echo "No commits to process"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Create changelog content
          NEW_FILE=NEW_CHANGELOG.md
          {
            echo "## Update — ${DATE_UTC} (branch: ${BRANCH_NAME})"
            echo

            # Features
            FEATS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|feat" || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo "$FEATS" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Bug fixes
            FIXES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|fix" || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Performance
            PERFS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|perf" || true)
            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance"
              echo "$PERFS" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Documentation
            DOCS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|docs" || true)
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo "$DOCS" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Style
            STYLES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|style" || true)
            if [ -n "$STYLES" ]; then
              echo "### 🎨 Style"
              echo "$STYLES" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Refactor/Chore/Build
            CHORES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|(chore|refactor|build)" || true)
            if [ -n "$CHORES" ]; then
              echo "### 🧰 Maintenance"
              echo "$CHORES" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # CI
            CIS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|ci" || true)
            if [ -n "$CIS" ]; then
              echo "### ⚙️ CI/CD"
              echo "$CIS" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            # Tests
            TESTS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+\|test" || true)
            if [ -n "$TESTS" ]; then
              echo "### 🧪 Tests"
              echo "$TESTS" | while IFS='|' read -r hash msg author; do
                echo "- ${msg} (\`${hash}\`) by @${author}"
              done
              echo
            fi

            echo "---"
            echo
          } > "$NEW_FILE"

          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$NEW_FILE"
          mv "$NEW_FILE" CHANGELOG.md

      - name: Commit changelog
        if: steps.changelog.outputs.has_changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(changelog): auto-update [skip ci]"
          git push
