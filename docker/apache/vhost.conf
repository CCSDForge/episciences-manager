# Manager
<VirtualHost *:80>
    ServerAdmin contact@example.org
    DocumentRoot /var/www/htdocs/public/
    SetEnv APPLICATION_ENV development

    ServerName epimanager-dev.episciences.org
    Alias /public /var/www/htdocs/public
    AliasMatch ^/([^/]+)/resources/(.*)$ /var/www/htdocs/data/$1/public/$2

    DirectoryIndex index.php

    # Pass PHP scripts to the PHP-FPM container via TCP
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php-fpm-manager:9000"
        ProxyFCGISetEnvIf "true" SCRIPT_FILENAME "/var/www/htdocs/public%{reqenv:SCRIPT_NAME}"
        ProxyFCGISetEnvIf "true" DOCUMENT_ROOT "/var/www/htdocs/public"
    </FilesMatch>

    <Directory "/var/www/htdocs/public">
        Options Indexes MultiViews FollowSymLinks
        AllowOverride All
        Require all granted

        # Redirection Symfony
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    <Directory "/var/www/htdocs/data">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /usr/local/apache2/logs/manager-error.log
    CustomLog /usr/local/apache2/logs/manager-access.log combined
</VirtualHost>


# HTTPS VirtualHost for preprod
<IfModule ssl_module>
<VirtualHost *:443>
    ServerAdmin contact@example.org
    DocumentRoot /var/www/htdocs/public/
    SetEnv APPLICATION_ENV development

    ServerName epimanager-preprod.episciences.org
    Alias /public /var/www/htdocs/public
    AliasMatch ^/([^/]+)/resources/(.*)$ /var/www/htdocs/data/$1/public/$2

    DirectoryIndex index.php

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/ssl/epimanager-preprod.episciences.org.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/ssl/epimanager-preprod.episciences.org.key

    # Pass PHP scripts to the PHP-FPM container via TCP
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php-fpm-manager:9000"
        ProxyFCGISetEnvIf "true" SCRIPT_FILENAME "/var/www/htdocs/public%{reqenv:SCRIPT_NAME}"
        ProxyFCGISetEnvIf "true" DOCUMENT_ROOT "/var/www/htdocs/public"
    </FilesMatch>

    <Directory "/var/www/htdocs/public">
        Options Indexes MultiViews FollowSymLinks
        AllowOverride All
        Require all granted

        # Redirection Symfony
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    <Directory "/var/www/htdocs/data">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /usr/local/apache2/logs/manager-ssl-error.log
    CustomLog /usr/local/apache2/logs/manager-ssl-access.log combined
</VirtualHost>
</IfModule>