[req]
default_bits = 2048
prompt = no
distinguished_name = req_distinguished_name
req_extensions = v3_req

[req_distinguished_name]
C = FR
ST = France
L = Lyon
O = Episciences
OU = Development
CN = epimanager-preprod.episciences.org
emailAddress = dev@episciences.org

[v3_req]
keyUsage = keyEncipherment, dataEncipherment, digitalSignature
extendedKeyUsage = serverAuth
subjectAltName = @alt_names

[alt_names]
DNS.1 = epimanager-preprod.episciences.org
DNS.2 = localhost
IP.1 = 127.0.0.1
