controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|fr
    defaults:
        _locale: en

# Allow home page to be accessed directly at root /
app_home_root:
    path: /
    controller: App\Controller\DefaultController::index
    methods: [GET]
    defaults:
        _locale: en