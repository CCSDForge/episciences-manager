              en: "For Authors"
              fr: "Pour les auteurs/autrices"
            type: "container"
            children:
              - code: "prepare-submission"
                title:
                  en: "Prepare Your Submission"
                  fr: "Préparer votre soumission"
                  es: "Preparar su envío"
              - code: "editorial-workflow"
                title:
                  en: "Editorial Workflow"
                  fr: "Flux éditorial"
                  es: "Flujo editorial"
          - code: "for-reviewers"
            title:
              en: "For Reviewers"
              fr: "Pour les évaluateurs"
              es: "Para les revisores"
          - code: "for-conference-organisers"
            title:
              en: "For Conference Organisers"
              fr: "Pour les organisateurs de conférences"
              es: "Para los organizadores de congresos"
          - code: "for-submissions-committee"
            title:
              en: "For Submissions Committee"
              fr: "Pour le comité des soumissions"
              es: "Para el comité de envíos"
          - code: "proposing-special-issues"
            title:
              en: "Proposing Special Issues"
              fr: "Proposer des numéros spéciaux"
              es: "Proponer números especiales"
      - code: "credits"
        title:
          en: "Credits"
          fr: "Crédits"
          es: "Créditos"
        order: 4
      - code: "custom-page"
        title:
          en: "Custom Page"
          fr: "Page personnalisée"
          es: "Página personalizada"
        order: 5
