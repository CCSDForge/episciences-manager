# Generic page hierarchy configuration
# This configuration applies to all journals by default
page_hierarchies:

  # Default configuration for all journals
  default:
    main_pages:
      - title:
          en: "About"
          fr: "À Propos"
        type: "container"
        order: 1
        children:
          - "about"
          - "journal-indexing"
          - "journal-acknowledgements"
      - title:
          en: "Boards"
          fr: "Comités"
        type: "container"
        order: 2
        children:
          - "introduction-board"
          - "editorial-board"
          - "scientific-advisory-board"
          - "technical-board"
          - "reviewers-board"
          - "former-members"
          - "operating-charter-board"
      - title:
          en: "For Authors"
          fr: "Pour les Auteurs"
        type: "container"
        order: 3
        children:
          - "ethical-charter"
          - "prepare-submission"
          - "editorial-workflow"
      - code: "credits"
        order: 4
      - code: "custom-page"
        order: 4
      - code: "News"
        order: 6


  # Specific configuration for a particular journal (optional)
  # If a journal needs a different structure, add it here
  # example_special_journal:
  #   main_pages:
  #     - code: "home"
  #       order: 1
  #     - code: "editorial"
  #       order: 2