# Generic page hierarchy configuration
# This configuration applies to all journals by default
page_hierarchies:

  # Default configuration for all journals
  default:
    main_pages:
      - title:
          en: "About"
          fr: "À propos"
        type: "container"
        order: 1
        children:
          - code: "about"
            title:
              en: "About"
              fr: "À propos"
              es: "Acerca de"
          - code: "journal-indexing"
            title:
              en: "Journal Indexing"
              fr: "Indexation du journal"
              es: "Indexación de la revista"
          - code: "journal-acknowledgements"
            title:
              en: "Acknowledgements"
              fr: "Remerciements"
              es: "Agradecimientos"
      - title:
          en: "Boards"
          fr: "Comités"
        type: "container"
        order: 2
        children:
          - code: "introduction-board"
            title:
              en: "Introduction"
              fr: "Introduction"
              es: "Introducción"
          - code: "scientific-advisory-board"
            title:
              en: "Scientific Advisory Board"
              fr: "Comité scientifique consultatif"
              es: "Comité Científico Asesor"
          - code: "editorial-board"
            title:
              en: "Editorial Board"
              fr: "Comité éditorial"
              es: "Comité Editorial"
          - code: "technical-board"
            title:
              en: "Technical Board"
              fr: "Comité technique"
              es: "Comité Técnico"
          - code: "reviewers-board"
            title:
              en: "Reviewers"
              fr: "Évaluateurs"
              es: "Revisores"
          - code: "former-members"
            title:
              en: "Former Members"
              fr: "Anciens membres"
              es: "Antiguos miembros"
          - code: "operating-charter-board"
            title:
              en: "Operating Charter"
              fr: "Charte de fonctionnement"
              es: "Carta de funcionamiento"
          - code: "test-board"
            title:
              en: "English Charter"
              fr: "french fonctionnement"
              es: "espagnol funcionamiento"
      - title:
          en: "Publish"
          fr: "Publier"
        type: "container"
        order: 3
        children:
          - code: "ethical-charter"
            title:
              en: "Ethical Charter"
              fr: "Charte éthique"
              es: "Carta ética"
