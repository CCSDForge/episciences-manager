parameters:
  app.log_dir: '%kernel.logs_dir%'

monolog:
  handlers:
    main:
      type: fingers_crossed
      action_level: error
      handler: nested
      excluded_http_codes: [404, 405]
      buffer_size: 50
    nested:
      type: stream
      path: "%env(default:app.log_dir:LOG_PATH)%/%kernel.environment%.log"
      level: debug
    deprecation:
      type: stream
      channels: [deprecation]
      path: php://stderr
      formatter: monolog.formatter.json
